name: Build universal macOS binaries

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          swift --version || true
          xcodebuild -version || true
          xcrun --show-sdk-path || true

      - name: Make build script executable
        run: chmod +x scripts/build-universal.sh

      - name: Run universal build script
        run: ./scripts/build-universal.sh both

      - name: Upload universal binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-remote-universal
          path: build/universal
